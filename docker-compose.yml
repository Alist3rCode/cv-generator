services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cvgen
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvgen -d cvgen"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
