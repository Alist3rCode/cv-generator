{% extends "base.html" %}
{% block title %}Importer un template — CV Generator{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-upload"></i> Importer un template Word</h3>

<div class="card shadow-sm">
  <div class="card-body">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/templates/upload" enctype="multipart/form-data">

      <div class="mb-3">
        <label class="form-label">Nom du template <span class="text-danger">*</span></label>
        <input type="text" name="nom" class="form-control" required placeholder="CV Sopra Steria 2025" />
      </div>

      <div class="mb-3">
        <label class="form-label">Organisation <span class="text-danger">*</span></label>
        <select name="organisation_id" class="form-select" required>
          {% for org in admin_orgs %}
          <option value="{{ org.id }}">{{ org.nom }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label">Fichier .docx <span class="text-danger">*</span></label>
        <input type="file" name="fichier" class="form-control" accept=".docx" required />
        <div class="form-text">Seuls les fichiers Word (.docx) sont acceptés.</div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          <i class="bi bi-upload"></i> Importer
        </button>
        <a href="/templates/" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
