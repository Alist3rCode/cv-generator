{% extends "base.html" %}
{% block title %}{% if cert %}Modifier{% else %}Ajouter{% endif %} une certification{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-patch-check"></i> {% if cert %}Modifier{% else %}Nouvelle{% endif %} certification</h3>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="{% if cert %}/certifications/{{ cert.id }}/edit{% else %}/certifications/new{% endif %}">

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Titre <span class="text-danger">*</span></label>
          <input type="text" name="titre" class="form-control" required
                 value="{{ cert.titre if cert else '' }}" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Organisme <span class="text-danger">*</span></label>
          <input type="text" name="organisme" class="form-control" required
                 value="{{ cert.organisme if cert else '' }}" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Date d'obtention <span class="text-danger">*</span></label>
          <input type="date" name="date_obtention" class="form-control" required
                 value="{{ cert.date_obtention.isoformat() if cert else '' }}" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Date d'expiration</label>
          <input type="date" name="date_fin" class="form-control"
                 value="{{ cert.date_fin.isoformat() if cert and cert.date_fin else '' }}" />
          <div class="form-text">Laisser vide si pas d'expiration</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Langue <span class="text-danger">*</span></label>
          <select name="language_id" class="form-select" required>
            {% for lang in languages %}
            <option value="{{ lang.id }}" {% if cert and cert.language_id == lang.id %}selected{% endif %}>
              {{ lang.nom }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Enregistrer</button>
        <a href="/certifications/" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
