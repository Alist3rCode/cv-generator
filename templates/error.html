{% extends "base.html" %}
{% block title %}Erreur {{ status_code }} — CV Generator{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:60vh; text-align:center;">

  <div class="display-1 fw-bold mb-2" style="font-size:8rem; line-height:1; opacity:.15;">
    {{ status_code }}
  </div>

  <h2 class="fw-semibold mb-3">{{ title }}</h2>
  <p class="text-muted mb-4" style="max-width:420px;">{{ detail }}</p>

  <a href="/dashboard" class="btn btn-primary">
    <i class="bi bi-house"></i> Retour au tableau de bord
  </a>

</div>
{% endblock %}
