<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CV Generator{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  {% block head_extra %}{% endblock %}
  <!-- Dark mode : appliquer avant le rendu pour eviter le flash -->
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var preferred = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', preferred);
    })();
  </script>
</head>
<body class="{% if current_user %}has-sidebar{% endif %}">

{% if current_user %}
<!-- ═══════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
<aside id="appSidebar" class="app-sidebar">

  <!-- Logo / brand -->
  <div class="sidebar-brand">
    <a href="/dashboard" class="sidebar-brand-link">
      <i class="bi bi-file-earmark-person sidebar-icon"></i>
      <span class="sidebar-label">CV Generator</span>
    </a>
  </div>

  <!-- Toggle collapse -->
  <button id="sidebarToggle" class="sidebar-toggle" title="Réduire">
    <i class="bi bi-chevron-double-left"></i>
  </button>

  <!-- Nav links -->
  <nav class="sidebar-nav">
    <a href="/dashboard"
       class="sidebar-link {% if request.url.path == '/dashboard' %}active{% endif %}">
      <i class="bi bi-house sidebar-icon"></i>
      <span class="sidebar-label">Tableau de bord</span>
    </a>
    <a href="/experiences/"
       class="sidebar-link {% if '/experiences' in request.url.path %}active{% endif %}">
      <i class="bi bi-briefcase sidebar-icon"></i>
      <span class="sidebar-label">Expériences</span>
    </a>
    <a href="/formations/"
       class="sidebar-link {% if '/formations' in request.url.path %}active{% endif %}">
      <i class="bi bi-mortarboard sidebar-icon"></i>
      <span class="sidebar-label">Formations</span>
    </a>
    <a href="/certifications/"
       class="sidebar-link {% if '/certifications' in request.url.path %}active{% endif %}">
      <i class="bi bi-patch-check sidebar-icon"></i>
      <span class="sidebar-label">Certifications</span>
    </a>
    <a href="/competences/"
       class="sidebar-link {% if '/competences' in request.url.path %}active{% endif %}">
      <i class="bi bi-stars sidebar-icon"></i>
      <span class="sidebar-label">Compétences</span>
    </a>
    <a href="/exports/"
       class="sidebar-link {% if '/exports' in request.url.path %}active{% endif %}">
      <i class="bi bi-download sidebar-icon"></i>
      <span class="sidebar-label">Exporter CV</span>
    </a>
    <a href="/templates/"
       class="sidebar-link {% if '/templates' in request.url.path %}active{% endif %}">
      <i class="bi bi-layout-text-window sidebar-icon"></i>
      <span class="sidebar-label">Templates</span>
    </a>
  </nav>

  <!-- Footer : profil + actions -->
  <div class="sidebar-footer">
    <div class="sidebar-divider"></div>

    <a href="/profile/edit" class="sidebar-link {% if '/profile' in request.url.path %}active{% endif %}">
      <i class="bi bi-person-circle sidebar-icon"></i>
      <span class="sidebar-label">{{ current_user.prenom }} {{ current_user.nom }}</span>
    </a>
    <a href="/admin/trash" class="sidebar-link {% if '/admin' in request.url.path %}active{% endif %}">
      <i class="bi bi-trash sidebar-icon"></i>
      <span class="sidebar-label">Corbeille</span>
    </a>

    <!-- Toggle thème -->
    <div class="sidebar-link sidebar-theme-row">
      <i class="bi bi-moon-stars sidebar-icon" id="themeIcon"></i>
      <span class="sidebar-label">
        <span id="themeLabel">Thème sombre</span>
        <div class="form-check form-switch mb-0 ms-auto">
          <input class="form-check-input" type="checkbox" id="themeToggle" role="switch" />
        </div>
      </span>
    </div>

    <a href="/logout" class="sidebar-link text-danger">
      <i class="bi bi-box-arrow-right sidebar-icon"></i>
      <span class="sidebar-label">Déconnexion</span>
    </a>
  </div>

</aside>
<!-- Overlay mobile -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>
{% endif %}

<main class="app-main {% if not current_user %}app-main--full{% endif %}">
  <div class="main-inner py-4">
    {% block content %}{% endblock %}
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/**
 * initLocationAutocomplete — autocomplete Nominatim avec navigation clavier.
 * @param {HTMLInputElement} inputEl  — champ texte
 * @param {HTMLUListElement} listEl   — <ul> dropdown
 * @param {Function}         onChange — callback à appeler après sélection
 */
function initLocationAutocomplete(inputEl, listEl, onChange) {
  if (!inputEl || !listEl) return;

  var timer      = null;
  var activeIdx  = -1;   // index de l'item survolé/sélectionné au clavier

  function getItems() {
    return Array.from(listEl.querySelectorAll('li'));
  }

  function setActive(idx) {
    var items = getItems();
    items.forEach(function(li, i) {
      li.classList.toggle('active', i === idx);
    });
    activeIdx = idx;
  }

  function selectItem(li) {
    inputEl.value = li.textContent;
    listEl.style.display = 'none';
    activeIdx = -1;
    if (onChange) onChange();
  }

  function buildList(results) {
    listEl.innerHTML = '';
    activeIdx = -1;
    var seen = new Set();
    results.forEach(function(r) {
      var city    = r.address.city || r.address.town || r.address.village || r.address.county || r.display_name.split(',')[0];
      var country = r.address.country || '';
      var label   = city.trim() + (country ? ', ' + country : '');
      if (seen.has(label)) return;
      seen.add(label);
      var li = document.createElement('li');
      li.className = 'list-group-item list-group-item-action py-1 small';
      li.style.cursor = 'pointer';
      li.textContent  = label;
      li.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectItem(li);
      });
      listEl.appendChild(li);
    });
    listEl.style.display = listEl.children.length ? 'block' : 'none';
  }

  inputEl.addEventListener('input', function() {
    clearTimeout(timer);
    var q = inputEl.value.trim();
    if (q.length < 2) { listEl.style.display = 'none'; return; }
    timer = setTimeout(function() {
      fetch('https://nominatim.openstreetmap.org/search?format=json&limit=6&addressdetails=1&q=' + encodeURIComponent(q), {
        headers: { 'Accept-Language': 'fr' }
      })
      .then(function(r) { return r.json(); })
      .then(buildList)
      .catch(function() { listEl.style.display = 'none'; });
    }, 400);
  });

  inputEl.addEventListener('keydown', function(e) {
    var items = getItems();
    var visible = listEl.style.display !== 'none' && items.length > 0;

    if (e.key === 'ArrowDown') {
      if (!visible) return;
      e.preventDefault();
      setActive(Math.min(activeIdx + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      if (!visible) return;
      e.preventDefault();
      setActive(Math.max(activeIdx - 1, 0));
    } else if (e.key === 'Enter') {
      if (!visible) return;
      // Si un item est actif (navigation clavier), on le sélectionne
      if (activeIdx >= 0 && items[activeIdx]) {
        e.preventDefault();
        selectItem(items[activeIdx]);
      } else if (items.length === 1) {
        // Un seul item visible : l'Enter le valide
        e.preventDefault();
        selectItem(items[0]);
      }
    } else if (e.key === 'Escape') {
      listEl.style.display = 'none';
      activeIdx = -1;
    }
  });

  document.addEventListener('click', function(e) {
    if (!listEl.contains(e.target) && e.target !== inputEl) {
      listEl.style.display = 'none';
      activeIdx = -1;
    }
  });
}
</script>
<script>
(function() {
  /* ── Thème ── */
  var toggle = document.getElementById('themeToggle');
  var label  = document.getElementById('themeLabel');
  var icon   = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-bs-theme', theme);
    localStorage.setItem('theme', theme);
    var dark = theme === 'dark';
    if (toggle) toggle.checked = dark;
    if (label)  label.textContent = dark ? 'Thème clair' : 'Thème sombre';
    if (icon)   icon.className    = dark ? 'bi bi-sun sidebar-icon' : 'bi bi-moon-stars sidebar-icon';
    if (typeof window.__onThemeChange === 'function') window.__onThemeChange(theme);
  }

  var stored    = localStorage.getItem('theme');
  var preferred = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(preferred);

  if (toggle) {
    toggle.addEventListener('change', function() { applyTheme(toggle.checked ? 'dark' : 'light'); });
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
  });

  /* ── Sidebar collapse ── */
  var sidebar  = document.getElementById('appSidebar');
  var btn      = document.getElementById('sidebarToggle');
  var overlay  = document.getElementById('sidebarOverlay');
  if (!sidebar) return;

  var COLLAPSED_KEY = 'sidebarCollapsed';

  var main = document.querySelector('.app-main');

  function setCollapsed(collapsed, save) {
    sidebar.classList.toggle('sidebar--collapsed', collapsed);
    if (main) main.style.marginLeft = collapsed ? 'var(--sidebar-w-collapsed)' : 'var(--sidebar-w)';
    if (btn) {
      btn.querySelector('i').className = collapsed
        ? 'bi bi-chevron-double-right'
        : 'bi bi-chevron-double-left';
      btn.title = collapsed ? 'Agrandir' : 'Réduire';
    }
    if (save) localStorage.setItem(COLLAPSED_KEY, collapsed ? '1' : '0');
  }

  // Restore state
  setCollapsed(localStorage.getItem(COLLAPSED_KEY) === '1', false);

  if (btn) {
    btn.addEventListener('click', function() {
      var isCollapsed = sidebar.classList.contains('sidebar--collapsed');
      setCollapsed(!isCollapsed, true);
    });
  }

  // Mobile overlay
  if (overlay) {
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('sidebar--open');
      overlay.classList.remove('active');
    });
  }
})();
</script>
</body>
</html>
