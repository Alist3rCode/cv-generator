{% extends "base.html" %}
{% block title %}Créer un compte — CV Generator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-body p-4">
        <h3 class="card-title mb-4"><i class="bi bi-person-plus"></i> Créer un compte</h3>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/users/register" id="registerForm">
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Prénom</label>
              <input type="text" name="prenom" class="form-control" required />
            </div>
            <div class="col">
              <label class="form-label">Nom</label>
              <input type="text" name="nom" class="form-control" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required />
          </div>

          <!-- Mot de passe -->
          <div class="mb-2">
            <label class="form-label">Mot de passe</label>
            <div class="input-group">
              <input type="password" name="password" id="password"
                     class="form-control" minlength="8" required
                     autocomplete="new-password" />
              <button type="button" class="btn btn-outline-secondary" id="togglePwd" tabindex="-1">
                <i class="bi bi-eye" id="eyePwd"></i>
              </button>
            </div>
          </div>

          <!-- Barre de force -->
          <div class="mb-3">
            <div class="progress" style="height:6px;">
              <div id="strengthBar" class="progress-bar" role="progressbar"
                   style="width:0%; transition:width .3s,background-color .3s;"></div>
            </div>
            <div class="d-flex justify-content-between mt-1">
              <small id="strengthLabel" class="text-muted"></small>
              <small id="strengthHint" class="text-muted"></small>
            </div>
          </div>

          <!-- Confirmation mot de passe -->
          <div class="mb-4">
            <label class="form-label">Confirmer le mot de passe</label>
            <div class="input-group">
              <input type="password" name="password_confirm" id="passwordConfirm"
                     class="form-control" minlength="8" required
                     autocomplete="new-password" />
              <button type="button" class="btn btn-outline-secondary" id="toggleConfirm" tabindex="-1">
                <i class="bi bi-eye" id="eyeConfirm"></i>
              </button>
            </div>
            <div id="matchFeedback" class="form-text" style="display:none;"></div>
          </div>

          <div class="mb-4">
            <label class="form-label">Organisation</label>
            <select name="organisation_id" class="form-select" required>
              <option value="">-- Choisir --</option>
              {% for org in organisations %}
              <option value="{{ org.id }}">{{ org.nom }}</option>
              {% endfor %}
            </select>
          </div>

          <button type="submit" class="btn btn-primary w-100" id="btnSubmit">
            Créer mon compte
          </button>
        </form>

        <p class="text-center mt-3 mb-0">
          <a href="/login">Déjà un compte ? Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  /* ── Afficher / masquer mot de passe ──────────────────────────── */
  function toggleVisibility(inputId, iconId) {
    var input = document.getElementById(inputId);
    var icon  = document.getElementById(iconId);
    var show  = input.type === 'password';
    input.type = show ? 'text' : 'password';
    icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
  }
  document.getElementById('togglePwd').addEventListener('click', function () {
    toggleVisibility('password', 'eyePwd');
  });
  document.getElementById('toggleConfirm').addEventListener('click', function () {
    toggleVisibility('passwordConfirm', 'eyeConfirm');
  });

  /* ── Barre de force ───────────────────────────────────────────── */
  var LEVELS = [
    { label: 'Très faible', color: '#dc3545', pct: 20 },
    { label: 'Faible',      color: '#fd7e14', pct: 40 },
    { label: 'Moyen',       color: '#ffc107', pct: 60 },
    { label: 'Fort',        color: '#198754', pct: 80 },
    { label: 'Très fort',   color: '#0d6efd', pct: 100 },
  ];

  function scorePassword(pwd) {
    if (!pwd) return -1;
    var score = 0;
    if (pwd.length >= 8)  score++;
    if (pwd.length >= 12) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    return Math.min(score, 4); // 0 → 4
  }

  function buildHint(pwd) {
    var hints = [];
    if (pwd.length < 8)           hints.push('8 caractères min.');
    if (!/[A-Z]/.test(pwd))       hints.push('une majuscule');
    if (!/[0-9]/.test(pwd))       hints.push('un chiffre');
    if (!/[^A-Za-z0-9]/.test(pwd)) hints.push('un caractère spécial');
    return hints.length ? 'Ajouter : ' + hints.join(', ') : '';
  }

  var bar      = document.getElementById('strengthBar');
  var lbl      = document.getElementById('strengthLabel');
  var hint     = document.getElementById('strengthHint');
  var pwdInput = document.getElementById('password');

  pwdInput.addEventListener('input', function () {
    var pwd   = pwdInput.value;
    var score = scorePassword(pwd);
    if (score < 0) {
      bar.style.width = '0%';
      lbl.textContent = '';
      hint.textContent = '';
      return;
    }
    var level = LEVELS[score];
    bar.style.width           = level.pct + '%';
    bar.style.backgroundColor = level.color;
    lbl.textContent           = level.label;
    lbl.style.color           = level.color;
    hint.textContent          = buildHint(pwd);
    checkMatch();
  });

  /* ── Vérification concordance ─────────────────────────────────── */
  var confirmInput = document.getElementById('passwordConfirm');
  var matchFb      = document.getElementById('matchFeedback');
  var btnSubmit    = document.getElementById('btnSubmit');

  function checkMatch() {
    var pwd     = pwdInput.value;
    var confirm = confirmInput.value;
    if (!confirm) {
      matchFb.style.display = 'none';
      confirmInput.classList.remove('is-valid', 'is-invalid');
      btnSubmit.disabled = false;
      return;
    }
    matchFb.style.display = '';
    if (pwd === confirm) {
      confirmInput.classList.add('is-valid');
      confirmInput.classList.remove('is-invalid');
      matchFb.className   = 'form-text text-success';
      matchFb.textContent = 'Les mots de passe correspondent.';
      btnSubmit.disabled  = false;
    } else {
      confirmInput.classList.add('is-invalid');
      confirmInput.classList.remove('is-valid');
      matchFb.className   = 'form-text text-danger';
      matchFb.textContent = 'Les mots de passe ne correspondent pas.';
      btnSubmit.disabled  = true;
    }
  }

  confirmInput.addEventListener('input', checkMatch);

  /* ── Bloquer la soumission si les mots de passe diffèrent ─────── */
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    if (pwdInput.value !== confirmInput.value) {
      e.preventDefault();
      checkMatch();
    }
  });
})();
</script>
{% endblock %}
