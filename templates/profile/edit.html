{% extends "base.html" %}
{% block title %}Mon profil — CV Generator{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-person-vcard"></i> Mon profil</h3>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="/profile/edit">

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-control" value="{{ current_user.prenom }}" disabled />
        </div>
        <div class="col-md-6">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" value="{{ current_user.nom }}" disabled />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" value="{{ current_user.email }}" disabled />
      </div>

      <div class="mb-3">
        <label class="form-label">Téléphone</label>
        <input type="tel" name="telephone" class="form-control"
               value="{{ profile.telephone if profile and profile.telephone else '' }}"
               placeholder="+33 6 00 00 00 00" />
      </div>

      <div class="mb-4">
        <label class="form-label">URL LinkedIn</label>
        <input type="url" name="linkedin_url" class="form-control"
               value="{{ profile.linkedin_url if profile and profile.linkedin_url else '' }}"
               placeholder="https://linkedin.com/in/..." />
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-save"></i> Enregistrer
        </button>
        <a href="/dashboard" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
